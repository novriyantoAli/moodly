      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Set user password
      tags:
      - user-password
  /api/v1/user-password/change:
    put:
      consumes:
      - application/json
      description: Change existing password
      parameters:
      - description: Change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_novriyantoAli_moodly_internal_application_security_dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Change password
      tags:
      - user-password
  /api/v1/user-password/verify:
    post:
      consumes:
      - application/json
      description: Verify username and password
      parameters:
      - description: Verify password request
        in: body
        name: request
