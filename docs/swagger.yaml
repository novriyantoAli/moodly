externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: |-
    A production-ready Go boilerplate following Domain-Driven Design (DDD)
    principles with NestJS-like architecture patterns.
    Built with modern Go practices, microservice architecture, and
    comprehensive background job processing.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Vibe DDD Golang API
  version: "1.0"
paths:
  /api/v1/scans:
    get:
      consumes:
      - application/json
      description: List scans with pagination and filtering
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Scan status (pending, completed, failed)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of scans
          schema:
            $ref: '#/definitions/github_com_novriyantoAli_moodly_internal_application_scan_dto.ScanListResponse'
        "400":
          description: Invalid query parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get all scans
      tags:
      - Scans
    post:
      consumes:
      - application/json
      description: Submit a barcode scan with device information
      parameters:
      - description: Scan request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_novriyantoAli_moodly_internal_application_scan_dto.CreateScanRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Scan created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new scan
      tags:
      - Scans
  /api/v1/scans/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a scan by ID
      parameters:
      - description: Scan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Scan deleted successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Scan not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Delete a scan
      tags:
      - Scans
    get:
      consumes:
      - application/json
      description: Retrieve scan details by ID
      parameters:
      - description: Scan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Scan details
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Scan not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get a scan by ID
      tags:
      - Scans
    put:
      consumes:
      - application/json
      description: Update the status of a scan (pending, completed, failed)
      parameters:
      - description: Scan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_novriyantoAli_moodly_internal_application_scan_dto.UpdateScanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Scan status updated
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Scan not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Update scan status
      tags:
      - Scans
  /api/v1/user-password:
    get:
      description: Get password security information
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_novriyantoAli_moodly_internal_application_security_dto.UserPasswordResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get password info
      tags:
